<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OOD HRMS — Login</title>
  <meta name="description" content="OOD Human Resource Management System – Odoo x Adamas University Hackathon 2026">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- DaisyUI + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{fontFamily:{sans:['Inter','system-ui','sans-serif']}}}}</script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>

  <link rel="stylesheet" href="/css/styles.css">
</head>

<body class="gradient-bg min-h-screen flex items-center justify-center p-4" x-data="authApp()">

  <!-- Decorative Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ═══ Auth Card ═══ -->
  <div class="glass-card w-full max-w-md p-8 relative z-10 fade-in">

    <!-- Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-violet-600 to-cyan-500 mb-4 shadow-lg shadow-violet-500/25">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
        </svg>
      </div>
      <h1 class="text-2xl font-extrabold gradient-text">OOD HRMS</h1>
      <p class="text-slate-400 text-sm mt-1">Odoo × Adamas Hackathon '26</p>
    </div>

    <!-- Tab Toggle -->
    <div class="flex bg-white/5 rounded-xl p-1 mb-6">
      <button @click="mode='login'"
              :class="mode==='login' ? 'bg-violet-600/30 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'"
              class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300">
        Sign In
      </button>
      <button @click="mode='register'"
              :class="mode==='register' ? 'bg-violet-600/30 text-white shadow-md' : 'text-slate-400 hover:text-slate-200'"
              class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all duration-300">
        Sign Up
      </button>
    </div>

    <!-- Login Form -->
    <form x-show="mode==='login'" x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 translate-x-4" x-transition:enter-end="opacity-100 translate-x-0"
          @submit.prevent="login" class="space-y-4">

      <label class="form-control w-full">
        <span class="label"><span class="label-text text-slate-300 text-xs font-medium">Email Address</span></span>
        <input type="email" x-model="email" required placeholder="you@oodhrms.com"
               class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500 focus:ring-1 focus:ring-violet-500/30">
      </label>

      <label class="form-control w-full">
        <span class="label"><span class="label-text text-slate-300 text-xs font-medium">Password</span></span>
        <input type="password" x-model="password" required placeholder="••••••••"
               class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500 focus:ring-1 focus:ring-violet-500/30">
      </label>

      <button type="submit" :disabled="loading"
              class="btn w-full border-0 bg-gradient-to-r from-violet-600 to-cyan-600 hover:from-violet-500 hover:to-cyan-500 text-white font-semibold shadow-lg shadow-violet-500/20 mt-2">
        <span x-show="!loading">Sign In</span>
        <span x-show="loading" class="flex items-center gap-2"><span class="spinner !w-5 !h-5 !border-2"></span> Signing in…</span>
      </button>
    </form>

    <!-- Register Form -->
    <form x-show="mode==='register'" x-transition:enter="transition ease-out duration-300"
          x-transition:enter-start="opacity-0 -translate-x-4" x-transition:enter-end="opacity-100 translate-x-0"
          @submit.prevent="register" class="space-y-4">

      <div class="grid grid-cols-2 gap-3">
        <label class="form-control">
          <span class="label"><span class="label-text text-slate-300 text-xs font-medium">First Name</span></span>
          <input type="text" x-model="firstName" required placeholder="Priya"
                 class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500">
        </label>
        <label class="form-control">
          <span class="label"><span class="label-text text-slate-300 text-xs font-medium">Last Name</span></span>
          <input type="text" x-model="lastName" required placeholder="Singh"
                 class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500">
        </label>
      </div>

      <label class="form-control w-full">
        <span class="label"><span class="label-text text-slate-300 text-xs font-medium">Email Address</span></span>
        <input type="email" x-model="email" required placeholder="priya.singh@oodhrms.com"
               class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500">
      </label>

      <label class="form-control w-full">
        <span class="label"><span class="label-text text-slate-300 text-xs font-medium">Password</span></span>
        <input type="password" x-model="password" required placeholder="Min 6 characters"
               class="input input-bordered w-full bg-white/5 border-white/10 text-white placeholder-slate-500 focus:border-violet-500">
      </label>

      <button type="submit" :disabled="loading"
              class="btn w-full border-0 bg-gradient-to-r from-violet-600 to-cyan-600 hover:from-violet-500 hover:to-cyan-500 text-white font-semibold shadow-lg shadow-violet-500/20 mt-2">
        <span x-show="!loading">Create Account</span>
        <span x-show="loading" class="flex items-center gap-2"><span class="spinner !w-5 !h-5 !border-2"></span> Creating…</span>
      </button>
    </form>

    <!-- Demo credentials hint -->
    <div class="mt-6 text-center">
      <p class="text-xs text-slate-500">Demo credentials</p>
      <p class="text-xs text-slate-400 mt-1">
        <span class="text-violet-400 font-medium">HR:</span> admin@oodhrms.com / admin123
      </p>
      <p class="text-xs text-slate-400">
        <span class="text-cyan-400 font-medium">Employee:</span> priya.singh@oodhrms.com / emp123
      </p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    function authApp() {
      return {
        mode: 'login',
        email: '',
        password: '',
        firstName: '',
        lastName: '',
        loading: false,

        init() {
          // Auto-redirect if already logged in
          const user = getUser();
          const token = getToken();
          if (user && token) {
            window.location.href = user.role === 'HR' ? '/admin.html' : '/employee.html';
          }
        },

        async login() {
          this.loading = true;
          try {
            const data = await api('/auth/login', {
              method: 'POST',
              body: { email: this.email, password: this.password },
            });
            saveAuth(data.token, data.user);
            showToast('Welcome back, ' + data.user.firstName + '!', 'success');
            setTimeout(() => {
              window.location.href = data.user.role === 'HR' ? '/admin.html' : '/employee.html';
            }, 600);
          } catch (err) {
            showToast(err.message, 'error');
          } finally {
            this.loading = false;
          }
        },

        async register() {
          if (this.password.length < 6) {
            showToast('Password must be at least 6 characters', 'warning');
            return;
          }
          this.loading = true;
          try {
            const data = await api('/auth/register', {
              method: 'POST',
              body: {
                email: this.email,
                password: this.password,
                firstName: this.firstName,
                lastName: this.lastName,
              },
            });
            // PRD: Simulated SMTP toast
            showToast(data.message, 'success', 6000);
            showToast('Employee ID: ' + data.employeeId, 'info', 6000);

            // Switch to login mode
            this.mode = 'login';
            this.firstName = '';
            this.lastName = '';
            this.password = '';
          } catch (err) {
            showToast(err.message, 'error');
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
